# ============================================================
# rom.cfg — linker config for the ROM binary
# Produces: build/rom.bin  (exactly 32KB, flat image)
# Loader writes byte 0 of file to $8000, byte N to $8000+N.
# fill = yes pads all gaps with $FF (erased-flash default).
# ============================================================

MEMORY {
  ZP:  file = "",  start = $0000, size = $0100, type = rw;
  RAM: file = "",  start = $0200, size = $1E00, type = rw;

  # Single flat 32KB region — one contiguous output file
  ROM: file = %O,  start = $8000, size = $8000, type = ro, fill = yes, fillval = $FF;
}

SEGMENTS {
  # Code and data packed from $8000 upward
  BOOTLOADER:   load = ROM, type = ro;
  BOOTRODATA:   load = ROM, type = ro;
  BIOS:         load = ROM, type = ro;
  BIOSRODATA:   load = ROM, type = ro;

  # DEVTABLE must be at $FF00 — this is where the C emulator reads it.
  # (fake6502.h: EMU_FLOPPY_BASE = 0xFF00, EMU_DISPTEXT_BASE = 0xFF08, etc.)
  DEVTABLE:     load = ROM, type = ro, start = $FF00;

  # 6502 hardware vectors — must be at $FFFA
  VECTORS:      load = ROM, type = ro, start = $FFFA;

  ZEROPAGE:     load = ZP,  type = zp, optional = yes;
}
