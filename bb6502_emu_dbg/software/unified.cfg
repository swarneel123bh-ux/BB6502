MEMORY {
  ZP:     start = $0000, size = $0100, type = rw;
  RAM:    start = $0200, size = $7E00, type = rw;
  ROM:    start = $8000, size = $8000, type = ro, fill = yes, fillval = $FF;
}

SEGMENTS {
  ZEROPAGE: load = ZP,  type = zp;

  BOOT:      load = ROM, type = ro;
  BIOS:      load = ROM, type = ro;

  KERNEL:    load = RAM, type = rw,  start = $0300;
  KRODATA:   load = RAM, type = ro;
  KBSS:      load = RAM, type = bss;

  KERNEL_API: load = ROM, type = ro, start = $FF00;

  VECTORS:   load = ROM, type = ro, start = $FFFA;
}
