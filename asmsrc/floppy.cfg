# ============================================================
# floppy.cfg — linker config for the floppy image
# Produces: build/floppy.bin
# Contains: KERNEL only
# Kernel is loaded into RAM at $2000 by the bootloader
# rom.o is passed in for symbol resolution only — its segments
# are mapped to a dummy area that writes nothing to the file
# ============================================================

# floppy.cfg (corrected)
MEMORY {
  ZP:           file = "",   start = $0000, size = $0100, type = rw;
  FLOPPY:       file = %O,   start = $2000, size = $7E00, type = rw, fill = yes, fillval = $00;
  KERNELRAM:    file = "",   start = $9000, size = $0200, type = rw;   # <-- new: BSS lives here
  DUMMY_ROM:    file = "",   start = $8000, size = $8000, type = ro;
}

SEGMENTS {
  KERNEL:       load = FLOPPY,     type = rw;
  KERNELRODATA: load = FLOPPY,     type = rw;   # <-- was ro
  KERNELBSS:    load = KERNELRAM,  type = bss;  # <-- was load = FLOPPY
  BOOTLOADER:   load = DUMMY_ROM,  type = ro,  optional = yes;
  BOOTRODATA:   load = DUMMY_ROM,  type = ro,  optional = yes;
  BIOS:         load = DUMMY_ROM,  type = ro,  optional = yes;
  BIOSRODATA:   load = DUMMY_ROM,  type = ro,  optional = yes;
  DEVTABLE:     load = DUMMY_ROM,  type = ro,  optional = yes;
  VECTORS:      load = DUMMY_ROM,  type = ro,  optional = yes;
  ZEROPAGE:     load = ZP,         type = zp,  optional = yes;
}
