# ============================================================
# test.cfg — shared linker config for all test binaries
# Layout:
#   $2000  test CODE + RODATA  (packed sequentially)
#   $8000  BIOS code + BIOSRODATA
#   $FFE4  device table
#   $FFFA  CPU vectors
#
# Single flat 64KB output — emulator loads at $0000
# fill=$00 matches old .dsb $2000,0 zero padding
# ============================================================

MEMORY {
  ZP:   file = "",  start = $0000, size = $0100, type = rw;

  # Full 64KB flat image — size must be $10000 (65536), not $FFFF
  MAIN: file = %O,  start = $0000, size = $10000, type = rw, fill = yes, fillval = $00;
}

SEGMENTS {
  # Test code and data packed from $2000 upward
  # RODATA has no explicit start — ld65 places it right after CODE
  CODE:       load = MAIN, type = rw,  start = $2000;
  RODATA:     load = MAIN, type = ro;

  # BIOS packed from $8000
  BIOS:       load = MAIN, type = ro,  start = $8000;
  BIOSRODATA: load = MAIN, type = ro,  optional = yes;

  # Fixed-address segments
  DEVTABLE:   load = MAIN, type = ro,  start = $FFE4;
  VECTORS:    load = MAIN, type = ro,  start = $FFFA;

  ZEROPAGE:   load = ZP,   type = zp,  optional = yes;
}
